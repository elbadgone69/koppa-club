<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOPPA — Back-office</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6fb;color:#1a1a2e;min-height:100vh}
  .login{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,51,160,.1);text-align:center}
  .logo{font-size:28px;font-weight:900;color:#0033A0;letter-spacing:.05em;margin-bottom:6px}
  .logo-sub{font-size:13px;color:#8a8a8a;margin-bottom:28px}
  input[type=password]{width:100%;padding:13px 16px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;margin-bottom:14px;outline:none}
  input[type=password]:focus{border-color:#0033A0}
  .btn{width:100%;background:#0033A0;color:#fff;border:none;padding:14px;border-radius:100px;font-size:15px;font-weight:700;cursor:pointer}
  .btn:hover{background:#001f6b}
  .err{color:#e24b4a;font-size:13px;margin-top:8px}

  /* ADMIN UI */
  #admin{display:none}
  header{background:#0033A0;color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
  .header-logo{font-size:20px;font-weight:900;letter-spacing:.05em}
  .header-sub{font-size:12px;opacity:.7;margin-top:2px}
  .header-actions{display:flex;gap:10px;align-items:center}
  .btn-sm{padding:8px 18px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;border:none}
  .btn-white{background:#fff;color:#0033A0}
  .btn-outline-white{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5)}
  main{padding:28px 32px;max-width:1200px;margin:0 auto}
  
  /* Stats bar */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
  .stat-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .stat-label{font-size:12px;color:#8a8a8a;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .stat-val{font-size:28px;font-weight:900;color:#0033A0}
  .stat-sub{font-size:12px;color:#8a8a8a;margin-top:4px}

  /* Clubs tabs */
  .clubs-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .club-tab{padding:8px 18px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;transition:.2s}
  .club-tab.active{background:#0033A0;color:#fff;border-color:#0033A0}

  /* Table */
  .section-title{font-size:15px;font-weight:800;margin-bottom:12px;color:#1a1a2e;display:flex;align-items:center;gap:8px}
  .count-badge{background:#0033A0;color:#fff;border-radius:100px;padding:2px 10px;font-size:12px}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  th{background:#f7f8fb;padding:12px 16px;text-align:left;font-size:12px;font-weight:700;color:#8a8a8a;text-transform:uppercase;letter-spacing:.04em}
  td{padding:13px 16px;font-size:14px;border-top:1px solid #f0f0f0}
  tr:hover td{background:#fafbff}
  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
  .badge-green{background:#e8f9f0;color:#1a7a4a}
  .export-btn{background:#f0f4ff;color:#0033A0;border:none;padding:7px 16px;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer}
  .export-btn:hover{background:#0033A0;color:#fff}
  .empty{text-align:center;padding:40px;color:#8a8a8a;font-size:14px}
  .loading{text-align:center;padding:60px;color:#8a8a8a}
  @media(max-width:600px){main{padding:16px};th,td{padding:10px 12px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="login-box">
    <div class="logo">KOPPA.</div>
    <div class="logo-sub">Back-office commandes</div>
    <input type="password" id="pwdInput" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Accéder →</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <header>
    <div>
      <div class="header-logo">KOPPA. Back-office</div>
      <div class="header-sub" id="lastRefresh"></div>
    </div>
    <div class="header-actions">
      <button class="btn-sm btn-outline-white" onclick="exportAll()">⬇ Exporter tout (CSV)</button>
      <button class="btn-sm btn-white" onclick="location.reload()">↻ Actualiser</button>
    </div>
  </header>
  <main>
    <div class="loading" id="loadingMsg">Chargement des commandes...</div>
    <div id="adminContent" style="display:none">
      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Commandes total</div>
          <div class="stat-val" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Revenu total</div>
          <div class="stat-val" id="statRevenu">—</div>
          <div class="stat-sub">Stripe net estimé</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Clubs actifs</div>
          <div class="stat-val" id="statClubs">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Dernière commande</div>
          <div class="stat-val" id="statLast" style="font-size:18px">—</div>
        </div>
      </div>

      <!-- Tabs clubs -->
      <div class="clubs-tabs" id="clubsTabs"></div>

      <!-- Table -->
      <div class="section-title">
        <span id="tableTitle">Toutes les commandes</span>
        <span class="count-badge" id="tableCount">0</span>
        <button class="export-btn" style="margin-left:auto" onclick="exportClub()">⬇ CSV ce club</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Acheteur</th>
            <th>Email</th>
            <th>Club</th>
            <th>Articles</th>
            <th>Total</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
let allOrders = [];
let activeClub = 'all';
let adminPwd = '';

async function login() {
  const pwd = document.getElementById('pwdInput').value;
  document.getElementById('loginErr').textContent = '';
  
  const res = await fetch('/.netlify/functions/get-orders', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });

  if (res.status === 401) {
    document.getElementById('loginErr').textContent = 'Mot de passe incorrect';
    return;
  }

  const data = await res.json();
  if (data.error) { document.getElementById('loginErr').textContent = data.error; return; }

  adminPwd = pwd;
  allOrders = data.orders;
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('admin').style.display = 'block';
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
  document.getElementById('lastRefresh').textContent = 'Actualisé le ' + new Date().toLocaleString('fr-FR');
  render();
}

function render() {
  const filtered = activeClub === 'all' ? allOrders : allOrders.filter(o => o.club_id === activeClub);

  // Stats
  const clubs = [...new Set(allOrders.map(o => o.club_id))];
  document.getElementById('statTotal').textContent = allOrders.length;
  document.getElementById('statRevenu').textContent = allOrders.reduce((s,o) => s + parseFloat(o.total), 0).toFixed(2).replace('.',',') + '€';
  document.getElementById('statClubs').textContent = clubs.length;
  const last = allOrders.sort((a,b) => b.timestamp - a.timestamp)[0];
  document.getElementById('statLast').textContent = last ? last.date : '—';

  // Tabs
  const tabs = document.getElementById('clubsTabs');
  const clubGroups = {};
  allOrders.forEach(o => { clubGroups[o.club_id] = o.club_name; });
  tabs.innerHTML = `<button class="club-tab ${activeClub==='all'?'active':''}" onclick="setClub('all')">Tous (${allOrders.length})</button>` +
    Object.entries(clubGroups).map(([id, name]) => {
      const cnt = allOrders.filter(o => o.club_id === id).length;
      return `<button class="club-tab ${activeClub===id?'active':''}" onclick="setClub('${id}')">${name} (${cnt})</button>`;
    }).join('');

  // Table
  document.getElementById('tableTitle').textContent = activeClub === 'all' ? 'Toutes les commandes' : (clubGroups[activeClub] || activeClub);
  document.getElementById('tableCount').textContent = filtered.length;

  const tbody = document.getElementById('ordersBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Aucune commande</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.sort((a,b) => b.timestamp - a.timestamp).map(o => `
    <tr>
      <td>${o.date}</td>
      <td><strong>${o.prenom} ${o.nom}</strong></td>
      <td><a href="mailto:${o.email}" style="color:#0033A0">${o.email}</a></td>
      <td>${o.club_name}</td>
      <td style="color:#555">${o.items}</td>
      <td><strong>${o.total}€</strong></td>
      <td><span class="badge badge-green">✓ Payé</span></td>
    </tr>`).join('');
}

function setClub(id) {
  activeClub = id;
  render();
}

function toCSV(orders) {
  const header = 'Date,Prénom,Nom,Email,Club,Articles,Total';
  const rows = orders.map(o => [o.date, o.prenom, o.nom, o.email, o.club_name, '"' + o.items + '"', o.total + '€'].join(','));
  return [header, ...rows].join('\n');
}

function download(filename, content) {
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(content);
  a.download = filename;
  a.click();
}

function exportAll() {
  download('koppa-commandes-toutes.csv', toCSV(allOrders));
}

function exportClub() {
  const filtered = activeClub === 'all' ? allOrders : allOrders.filter(o => o.club_id === activeClub);
  const name = activeClub === 'all' ? 'tous' : activeClub;
  download(`koppa-commandes-${name}.csv`, toCSV(filtered));
}
</script>
</body>
</html>
