[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/admin"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self';"

# Bloquer l'accès direct à admin.html
[[redirects]]
  from = "/admin.html"
  to = "/404"
  status = 404

# Route admin protégée via function
[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/admin"
  status = 200
